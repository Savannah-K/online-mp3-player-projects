<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mp3 Web Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jersey+25&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>

  <body>
    <h1>Web Mp3 Player</h1>

    <div class="player">
      <img src="Assets/Y2KFloral.png" alt="poster" id="poster" class="device" />
      <div class="screen">
        <div class="song-title">Song Title</div>

        <input type="range" name="progress" value="0" min="0" step="0.1" />
      </div>

      <div class="audio-player">
        <input type="file" accept="audio/*" id="audio-file" />
        <audio id="audio" preload="metadata"></audio>
      </div>
      <div class="wheel">
        <button class="wheel-button menu">MENU</button>
        <button class="wheel-button next">▶</button>
        <button class="wheel-button previous">◀</button>
        <button class="wheel-button play-pause">▶</button>
      </div>
    </div>
  </body>
</html>
>
